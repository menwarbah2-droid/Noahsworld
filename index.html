<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Tools Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f6f9; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #ddd; }
        .card h3 { margin-bottom: 15px; color: #222; }
        .btn { display: inline-block; background-color: #ef233c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn:hover { background-color: #d90429; }
    </style>
</head>
<body>

    <h1>My App Dashboard</h1>

    <div class="grid">
        <!-- কার্ড ১: আপনার ১ম অ্যাপ -->
        <div class="card">
            <h3>VAT Processing</h3>
            <a href="vat.html" class="btn">Open App</a>
        </div>

        <!-- কার্ড ২: আপনার ২য় অ্যাপ -->
        <div class="card">
            <h3>Benefit Pay QR</h3>
            <a href="benefit.html" class="btn">Open App</a>
        </div>

        <!-- কার্ড ৩: আপনার ৩য় অ্যাপ -->
        <div class="card">
            <h3>CPR ID Joiner</h3>
            <a href="cpr.html" class="btn">Open App</a>
        </div>
    </div>

</body>
</html>
