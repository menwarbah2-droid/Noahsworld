<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahrain Smart Tools Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; padding-top: 20px; }
        
        /* 🌟 MODERN CLEAN HEADER */
        .modern-header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding: 10px;
        }
        .modern-header h1 { 
            font-size: 28px; 
            font-weight: 800; 
            color: #0f172a; 
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .modern-header p { 
            font-size: 14px; 
            color: #64748b; 
            line-height: 1.5;
        }
        
        /* 📱 2-COLUMN GRID LAYOUT (যেমনটা স্ক্রিনশটে আছে) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            margin-bottom: 30px;
        }
        
        /* CARD STYLING */
        .card { 
            background: #ffffff; 
            padding: 30px 15px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.03); 
            border: 1px solid #e2e8f0; 
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        
        /* টাচ করলে বা ক্লিক করলে হালকা অ্যানিমেশন */
        .card:active { 
            transform: scale(0.97); 
            background-color: #f8fafc;
        }
        .card:hover {
            border-color: #3b82f6;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.05);
        }
        
        /* BLUE ICON STYLING (স্ক্রিনশটের মতো নীল রঙের আইকন) */
        .card .icon-wrapper {
            font-size: 32px;
            color: #2563eb;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card h3 { 
            font-size: 16px; 
            font-weight: 700; 
            color: #0f172a;
            margin-bottom: 6px;
        }
        
        .card p { 
            font-size: 12px; 
            color: #64748b;
            line-height: 1.4;
        }

        /* SVG Icons for Premium Look */
        .icon-svg {
            width: 36px;
            height: 36px;
            fill: none;
            stroke: #2563eb;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HEADER SECTION -->
        <header class="modern-header">
            <h1>Bahrain Tools Hub</h1>
            <p>High-efficiency retail utility applications.</p>
        </header>

        <!-- 2-COLUMN TOOLS GRID -->
        <div class="grid">
            
            <!-- ১. VAT Processing Card -->
            <a href="Vat.html" class="card">
                <div class="icon-wrapper">
                    <!-- 📊 Chart Icon -->
                    <svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                </div>
                <h3>VAT Tool</h3>
                <p>10% VAT Calculator</p>
            </a>

            <!-- ২. BenefitPay QR Card -->
            <a href="Qr.html" class="card">
                <div class="icon-wrapper">
                    <!-- 📦 Box Icon -->
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                </div>
                <h3>Benefit QR</h3>
                <p>Generate Pay Codes</p>
            </a>

            <!-- ৩. CPR Card Joiner Card -->
            <a href="Cpr.html" class="card">
                <div class="icon-wrapper">
                    <!-- 🆔 ID Card Icon -->
                    <svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"></rect><line x1="7" y1="8" x2="11" y2="8"></line><line x1="7" y1="12" x2="13" y2="12"></line><line x1="7" y1="16" x2="9" y2="16"></line></svg>
                </div>
                <h3>CPR Joiner</h3>
                <p>Merge Both Sides</p>
            </a>

            <!-- ৪. System Status / Info Card (গ্রিড মেলাতে বোনাস কার্ড) -->
            <div class="card" style="cursor: default;">
                <div class="icon-wrapper">
                    <!-- ⚡ Status Icon -->
                    <svg class="icon-svg" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                </div>
                <h3>Status</h3>
                <p>100% Secure & Live</p>
            </div>

        </div>
    </div>

</body>
</html>
