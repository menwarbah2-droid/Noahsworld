var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  //---------------------------------------------------------------------
  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

  //---------------------------------------------------------------------
  // QRMode
  //---------------------------------------------------------------------

  var QRMode = {
    MODE_NUMBER :    1 << 0,
    MODE_ALPHA_NUM : 1 << 1,
    MODE_8BIT_BYTE : 1 << 2,
    MODE_KANJI :     1 << 3
  };

  //---------------------------------------------------------------------
  // QRErrorCorrectionLevel
  //---------------------------------------------------------------------

  var QRErrorCorrectionLevel = {
    L : 1,
    M : 0,
    Q : 3,
    H : 2
  };

  //---------------------------------------------------------------------
  // QRMaskPattern
  //---------------------------------------------------------------------

  var QRMaskPattern = {
    PATTERN000 : 0,
    PATTERN001 : 1,
    PATTERN010 : 2,
    PATTERN011 : 3,
    PATTERN100 : 4,
    PATTERN101 : 5,
    PATTERN110 : 6,
    PATTERN111 : 7
  };

  //---------------------------------------------------------------------
  // QRUtil
  //---------------------------------------------------------------------

  var QRUtil = function() {

    var PATTERN_POSITION_TABLE = [
      [],
      [6, 18],
      [6, 22],
      [6, 26],
      [6, 30],
      [6, 34],
      [6, 22, 38],
      [6, 24, 42],
      [6, 26, 46],

      reference: ``,
      themeColor: `#DC2626`,
      frameStyle: `vibrant-pro`,
      printLayout: `full-a4`,
    };

    function toggleInputs() {
      const pType = document.getElementById('paymentType').value;
      config.paymentType = pType;

      const ibanBox = document.getElementById('ibanBox');
      const mobileBox = document.getElementById('mobileBox');

      if (pType === 'iban') {
        ibanBox.style.display = 'block';
        mobileBox.style.display = 'none';
      } else if (pType === 'mobile') {
        ibanBox.style.display = 'none';
        mobileBox.style.display = 'block';
      } else {
        ibanBox.style.display = 'block';
        mobileBox.style.display = 'block';
      }
    }

    function setTheme(color, frameStyle) {
      config.themeColor = color;
      config.frameStyle = frameStyle;
      updateQR();
    }

    function setLayout(layout) {
      config.printLayout = layout;
      
      // Update toggle buttons active rings
      ['full-a4', 'half-a4-double', 'four-up-card'].forEach(lay => {
        const btn = document.getElementById('btn-' + lay);
        if (lay === layout) {
          btn.className = "p-2 border border-red-500 bg-red-50 text-red-700 font-bold text-[10px] rounded-lg transition cursor-pointer text-center";
        } else {
          btn.className = "p-2 border border-slate-200 hover:bg-slate-50 text-slate-600 font-medium text-[10px] rounded-lg transition cursor-pointer text-center";
        }
      });
      
      updateQR();
    }

    function formatIBANString(ibanVal) {
      let clean = ibanVal.replace(/[^A-Z0-9]/gi, '').toUpperCase();
      if (!clean.startsWith('BH') && clean.length === 20) {
        clean = 'BH' + clean;
      }
      const parts = [];
      for (let i = 0; i < clean.length; i += 4) {
        parts.push(clean.substring(i, Math.min(i + 4, clean.length)));
      }
      return parts.join(' ');
    }

    function formatBahrainMobileString(mobileVal) {
      const clean = mobileVal.replace(/\D/g, '');
      if (clean.startsWith('973') && clean.length > 3) {
        const part = clean.substring(3);
        return "+973 " + part.substring(0, 4) + " " + part.substring(4, 8);
      }
      return "+973 " + mobileVal.substring(0, 4) + " " + mobileVal.substring(4, 8);
    }

    function formatBHDString(amountVal) {
      if (!amountVal) return '';
      const num = parseFloat(amountVal);
      if (isNaN(num)) return '';
      return num.toFixed(3) + " BHD";
    }

    function validateBahrainIBAN(ibanVal) {
      const clean = ibanVal.replace(/s+/g, '').toUpperCase();
      if (clean.length === 0) return { isValid: false, message: 'IBAN is required.' };
      if (!clean.startsWith('BH')) return { isValid: false, message: 'IBAN must start with "BH".' };
      if (clean.length !== 22) return { isValid: false, message: 'IBAN must be exactly 22 chars.' };
      if (!/^[A-Z0-9]+$/.test(clean.substring(2))) return { isValid: false, message: 'IBAN can only contain alphanumeric.' };
      return { isValid: true };
    }

    function validateBahrainMobile(mobileVal) {
      const clean = mobileVal.replace(/D/g, '');
      let mainPart = clean;
      if (clean.startsWith('973')) mainPart = clean.substring(3);
      if (mainPart.length === 0) return { isValid: false, message: 'Mobile number is required.' };
      if (mainPart.length !== 8) return { isValid: false, message: 'Mobile number must be 8 digits.' };
      if (!/^[136]d{7}$/.test(mainPart)) return { isValid: false, message: 'Mobile must begin with 1, 3 or 6.' };
      return { isValid: true };
    }

    function generatePayloadText() {
      const isIban = config.paymentType === 'iban';
      const isMobile = config.paymentType === 'mobile';
      const cleanIban = config.iban.replace(/s+/g, '').toUpperCase();
      const cleanMobile = config.mobile.replace(/D/g, '');
      
      const mobileWithPrefix = cleanMobile.startsWith('973') ? cleanMobile : '973' + cleanMobile;

      if (isIban) {
        const v = validateBahrainIBAN(cleanIban);
        if (!v.isValid) return "ERROR: " + v.message;
      }
      if (isMobile) {
        const v = validateBahrainMobile(cleanMobile);
        if (!v.isValid) return "ERROR: " + v.message;
      }

      const payloadObj = {};
      if (isIban) {
        payloadObj["iban"] = cleanIban;
      } else {
        payloadObj["mobile"] = mobileWithPrefix;
      }
      payloadObj["amount"] = config.amount || "";

      return JSON.stringify(payloadObj);
    }

    function resetDefaults() {
      document.getElementById('accountName').value = "NOAH 24 MARKET WLL";
      document.getElementById('paymentType').value = "iban";
      document.getElementById('iban').value = "BH12BENEF000012345678";
      document.getElementById('mobile').value = "39123456";
      document.getElementById('bankName').value = "Bank of Bahrain and Kuwait";
      
      config.accountName = "NOAH 24 MARKET WLL";
      config.paymentType = "iban";
      config.iban = "BH12BENEF000012345678";
      config.mobile = "39123456";
      config.bankName = "Bank of Bahrain and Kuwait";
      config.amount = "";
      config.reference = "";
      
      toggleInputs();
      updateQR();
    }

    function updateQR() {
      // Sync form values to config
      config.accountName = document.getElementById('accountName').value || 'NOAH 24 MARKET WLL';
      config.iban = document.getElementById('iban').value;
      config.mobile = document.getElementById('mobile').value;
      config.bankName = document.getElementById('bankName').value;
      config.amount = document.getElementById('amount') ? document.getElementById('amount').value : '';
      config.reference = document.getElementById('reference') ? document.getElementById('reference').value : '';

      const printGrid = document.getElementById('print-grid');
      const sheet = document.getElementById('a4-sheet');
      
      // Clear current grid
      printGrid.innerHTML = '';

      // Determine grid configuration
      let cardCount = 1;
      if (config.printLayout === 'full-a4') {
        printGrid.className = "grid grid-cols-1 w-full h-full";
        sheet.className = "bg-white w-[520px] min-h-[735px] shadow-2xl relative p-8 flex flex-col justify-between transition-all duration-300 print-area rounded-2xl";
        cardCount = 1;
      } else if (config.printLayout === 'half-a4-double') {
        printGrid.className = "grid grid-cols-2 gap-4 w-full h-full";
        sheet.className = "bg-white w-[750px] min-h-[520px] shadow-2xl relative p-6 flex flex-col justify-between transition-all duration-300 print-area rounded-2xl";
        cardCount = 2;
      } else {
        printGrid.className = "grid grid-cols-2 gap-3 w-full h-full";
        sheet.className = "bg-white w-[640px] min-h-[600px] shadow-2xl relative p-4 flex flex-col justify-between transition-all duration-300 print-area rounded-2xl";
        cardCount = 4;
      }

      // Generate payload
      const payloadText = generatePayloadText();

      // Render cards
      for (let i = 0; i < cardCount; i++) {
        const isVibrantPro = config.frameStyle === 'vibrant-pro';
        const card = document.createElement('div');
        
        card.className = "flex flex-col h-full bg-white text-gray-800 border-solid relative overflow-hidden transition-all duration-200";
        card.style.borderColor = config.themeColor;
        card.style.borderWidth = config.frameStyle === 'minimal' ? '1px' : isVibrantPro ? '4px' : '10px';
        card.style.borderRadius = isVibrantPro ? '1.75rem' : config.frameStyle === 'compact-counter' ? '1.25rem' : '1rem';
        
        if (config.printLayout === 'four-up-card') {
          card.style.padding = '0.75rem';
        } else {
          card.style.padding = '1.25rem';
        }

        // Inside card template HTML
        let cardHTML = '';
        
        // Accents
        if (isVibrantPro) {
          cardHTML += `<div class="absolute top-0 right-0 w-16 h-16 overflow-hidden pointer-events-none">
            <div class="absolute top-0 right-0 w-24 h-24 rotate-45 translate-x-12 -translate-y-12" style="background-color: ${config.themeColor}"></div>
          </div>`;
        }

        // Top Header
        if (isVibrantPro) {
          cardHTML += `<div class="w-full flex justify-between items-start pt-4 px-4 pb-1">
            <div class="font-extrabold text-xl tracking-tight leading-none" style="color: ${config.themeColor}">Benefit<span class="text-slate-800">Pay</span></div>
            <div class="text-right">
              <div class="text-[8px] text-slate-400 font-bold uppercase tracking-wider">Merchant Copy</div>
              <div class="text-[10px] text-slate-600 font-semibold mt-0.5">Scan to Pay</div>
            </div>
          </div>`;
        } else {
          cardHTML += `<div class="p-4 text-center text-white flex flex-col items-center justify-center relative rounded-t-lg" style="background-color: ${config.themeColor}">
            <div class="flex items-center justify-center gap-1">
              <span class="text-xs font-bold uppercase tracking-wider">SCAN & PAY SECURELY</span>
            </div>
          </div>`;
        }

        // Profile Detail Box
        cardHTML += `<div class="flex-1 flex flex-col items-center justify-center px-4 py-2 text-center">
          <div class="${isVibrantPro ? 'mb-3' : 'mb-2'}">
            <h3 class="${isVibrantPro ? 'text-xl font-extrabold text-slate-800 capitalize' : 'text-md font-bold text-slate-800 capitalize'}">
              ${config.accountName}
            </h3>
            <span class="text-[9px] text-slate-400 font-mono tracking-wider font-semibold block uppercase">${config.bankName || 'BenefitPay Instant Route'}</span>
          </div>`;

        // The exact QR DIV hook
        const qrId = 'qrcode-block-' + i;
        cardHTML += `<div id="${qrId}" class="p-2 bg-white flex items-center justify-center relative my-1 transition-all mx-auto" style="border-radius: ${isVibrantPro ? '24px' : '12px'}; border-width: ${isVibrantPro ? '6px' : '1px'}; border-style: solid; border-color: ${isVibrantPro ? config.themeColor : '#f1f5f9'}">
        </div>`;

        // Direct badge
        cardHTML += `<div class="bg-red-50 text-red-600 px-2 py-1 rounded-full text-[8px] font-bold tracking-wider uppercase mt-2 shadow-sm inline-flex items-center gap-1 mx-auto">
          <span class="w-1 h-1 rounded-full bg-red-600 animate-pulse"></span>
          Scan to Instant Transfer
        </div>`;

        // Data Table
        cardHTML += `<div class="w-full mt-3 bg-slate-50/70 border border-slate-100 rounded-xl p-2.5 text-left text-[9px] font-mono space-y-1">`;
        if (config.paymentType === 'iban') {
          cardHTML += `<div class="flex justify-between items-center"><span class="text-slate-400 font-sans font-bold">IBAN:</span><span class="text-slate-700 font-bold">BH12BE...5678</span></div>`;
        } else {
          cardHTML += `<div class="flex justify-between items-center"><span class="text-slate-400 font-sans font-bold">MobileNo:</span><span class="text-slate-700 font-bold">+973 3912 3456</span></div>`;
        }
        if (config.amount) {
          cardHTML += `<div class="flex justify-between items-center"><span class="text-slate-400 font-sans font-bold">Amount:</span><span class="text-red-600 font-bold"></span></div>`;
        }
        if (config.reference) {
          cardHTML += `<div class="flex justify-between items-center truncate"><span class="text-slate-400 font-sans font-bold">Note:</span><span class="text-slate-600 font-bold">${config.reference}</span></div>`;
        }
        cardHTML += `</div></div>`;

        // Footer instructions / message for Bahrain
        if (isVibrantPro) {
          cardHTML += `<div class="text-center bg-slate-50/60 p-2 border-t border-slate-100"><span class="text-[8px] text-slate-400 tracking-wider block font-bold uppercase font-mono">Central Bank of Bahrain</span></div>`;
        } else {
          cardHTML += `<div class="text-center bg-slate-100/50 p-1.5 border-t border-slate-100"><span class="text-[7px] text-slate-400 tracking-wide font-sans block">Open BenefitPay > scan QR to settle</span></div>`;
        }

        card.innerHTML = cardHTML;
        printGrid.appendChild(card);

        // Inject QR Code in safety frame using standard Kazuhiko Arase Generator
        try {
          if (payloadText.startsWith("ERROR:")) {
            document.getElementById(qrId).innerHTML = `<div class="flex flex-col items-center justify-center p-3 text-red-600 bg-red-50 rounded-xl text-center" style="width: 140px; height: 140px; border: 2px dashed #fca5a5;">
              <span class="text-xl font-bold">⚠️</span>
              <span class="text-[9px] font-black uppercase text-red-700 mt-1 block">Invalid Input</span>
              <span class="text-[8px] mt-0.5 leading-tight opacity-90 block">${payloadText.replace("ERROR:", "").trim()}</span>
            </div>`;
          } else {
            const typeNumber = 0; // automatic selection
            const errorCorrectionLevel = 'H';
            const qr = qrcode(typeNumber, errorCorrectionLevel);
            qr.addData(payloadText);
            qr.make();
            const qrImgTag = qr.createImgTag(config.printLayout === 'four-up-card' ? 3.5 : 4.5);
            document.getElementById(qrId).innerHTML = qrImgTag;
            
            // Style the injected image nicely
            const img = document.getElementById(qrId).querySelector('img');
            if (img) {
              img.className = "w-28 h-28 md:w-32 md:h-32 object-contain rounded-lg";
            }
          }
        } catch (e) {
          console.error(e);
          document.getElementById(qrId).innerHTML = '<span class="text-[9px] text-red-500">Failed to render QR</span>';
        }
      }
    }

    // Initialize on first load
    try {
      document.getElementById('current-date-el').innerText = "Date: " + new Date().toLocaleDateString('en-BH');
    } catch (e) {}
    toggleInputs();
    updateQR();
  </script>
</body>
  </html>
