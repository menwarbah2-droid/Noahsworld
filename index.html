<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Tools Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { background-color: #f8f9fa; padding: 20px; color: #212529; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* 🌟 MODERN PREMIUM HEADER STYLING */
        .modern-header { 
            background: #ffffff; 
            padding: 40px 20px; 
            border-radius: 16px; 
            text-align: center; 
            margin-bottom: 35px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); 
            border: 1px solid #eef2f5;
        }
        .modern-header h1 { 
            font-size: 32px; 
            font-weight: 800; 
            color: #1e293b; 
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .modern-header p { 
            font-size: 16px; 
            color: #64748b; 
            max-width: 600px; 
            margin: 0 auto;
            line-height: 1.6;
        }
        
        /* Form / Admin Panel Styling */
        .admin-panel { background: #fff; padding: 25px; border-radius: 16px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); border: 1px solid #eef2f5; }
        .admin-panel h3 { margin-bottom: 20px; color: #1e293b; font-size: 18px; font-weight: 700; }
        .form-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .form-group input { padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; width: 100%; transition: all 0.2s; background: #f8fafc; }
        .form-group input:focus { border-color: #ef233c; background: #fff; outline: none; }
        .add-btn { background-color: #1e293b; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; font-size: 15px; transition: background 0.2s; }
        .add-btn:hover { background-color: #0f172a; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; padding: 30px 25px; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); border: 1px solid #eef2f5; position: relative; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06); }
        .card h3 { margin-bottom: 20px; font-size: 19px; color: #1e293b; font-weight: 700; }
        .action-box { display: flex; gap: 12px; justify-content: center; align-items: center; }
        .btn { display: inline-block; background-color: #ef233c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; flex: 1; transition: background 0.2s; }
        .btn:hover { background-color: #d90429; }
        .delete-btn { background-color: #f1f5f9; border: none; color: #64748b; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .delete-btn:hover { background-color: #fee2e2; color: #ef233c; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 📝 এই অংশটি আপনি চাইলে পরে এডিট/পরিবর্তন করতে পারবেন -->
        <header class="modern-header">
            <h1>Bahrain Smart Tools Hub</h1>
            <p>A minimalist and secure workspace containing high-efficiency utility applications for daily retail and business operations.</p>
        </header>

        <!-- Tool Manager Panel -->
        <div class="admin-panel">
            <h3>➕ Add New Tool</h3>
            <div class="form-group">
                <input type="text" id="tool-name" placeholder="Tool Name (e.g., VAT Processing)">
                <input type="text" id="tool-url" placeholder="File Name (e.g., Vat.html)">
            </div>
            <button class="add-btn" onclick="addTool()">Add Tool to Grid</button>
        </div>

        <!-- Main Apps Grid -->
        <div class="grid" id="tools-grid"></div>
    </div>

    <script>
        // Default list setup
        const defaultTools = [
            { name: "VAT File Processing", url: "Vat.html" },
            { name: "Benefit Pay QR Generator", url: "Qr.html" },
            { name: "CPR Card Joiner", url: "Cpr.html" }
        ];

        function getTools() {
            const storedTools = localStorage.getItem('my_tools_list');
            if (storedTools) {
                return JSON.parse(storedTools);
            } else {
                localStorage.setItem('my_tools_list', JSON.stringify(defaultTools));
                return defaultTools;
            }
        }

        function displayTools() {
            const tools = getTools();
            const grid = document.getElementById('tools-grid');
            grid.innerHTML = '';

            tools.forEach((tool, index) => {
                grid.innerHTML += `
                    <div class="card">
                        <h3>${tool.name}</h3>
                        <div class="action-box">
                            <a href="${tool.url}" class="btn">Open App</a>
                            <button class="delete-btn" onclick="deleteTool(${index})">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        function addTool() {
            const nameInput = document.getElementById('tool-name');
            const urlInput = document.getElementById('tool-url');
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();

            if (!name || !url) {
                alert("Please fill in both fields!");
                return;
            }

            const tools = getTools();
            tools.push({ name: name, url: url });
            localStorage.setItem('my_tools_list', JSON.stringify(tools));

            nameInput.value = '';
            urlInput.value = '';
            displayTools();
        }

        function deleteTool(index) {
            if (confirm("Are you sure you want to remove this tool?")) {
                const tools = getTools();
                tools.splice(index, 1);
                localStorage.setItem('my_tools_list', JSON.stringify(tools));
                displayTools();
            }
        }

        displayTools();
    </script>
</body>
</html>
