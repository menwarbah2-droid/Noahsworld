var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {

  const n = qr.getModuleCount();

  ctx.save();

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, actualSize, actualSize);
  ctx.fillStyle = '#0f1116';

    const bytes = (typeof strOrBytes === 'string') ? strToBytes(strOrBytes) : strOrBytes;
    parts.push(bytes);
    currentOffset += bytes.length;
  }

  push('%PDF-1.4\n');

  offsets[1] = currentOffset;
  push('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');

  offsets[2] = currentOffset;
  push('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n');

  offsets[3] = currentOffset;
  push('3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + pageWPt + ' ' + pageHPt + '] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>\nendobj\n');

  offsets[4] = currentOffset;
  push('4 0 obj\n<< /Type /XObject /Subtype /Image /Width ' + imgW + ' /Height ' + imgH +
       ' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ' + jpegBytes.length + ' >>\nstream\n');
  push(jpegBytes);
  push('\nendstream\nendobj\n');

  offsets[5] = currentOffset;
  const content = 'q ' + pageWPt.toFixed(2) + ' 0 0 ' + pageHPt.toFixed(2) + ' 0 0 cm /Im0 Do Q';
  push('5 0 obj\n<< /Length ' + content.length + ' >>\nstream\n' + content + '\nendstream\nendobj\n');

  const xrefOffset = currentOffset;
  let xref = 'xref\n0 6\n0000000000 65535 f \n';
  for (let i = 1; i <= 5; i++) xref += String(offsets[i]).padStart(10, '0') + ' 00000 n \n';
  push(xref);
  push('trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n' + xrefOffset + '\n%%EOF');

  let total = 0;
  parts.forEach(p => total += p.length);
  const result = new Uint8Array(total);
  let off = 0;
  parts.forEach(p => { result.set(p, off); off += p.length; });
  return result;
}

// canvas: an HTMLCanvasElement already drawn with the full sheet
// Returns a Blob with mime type application/pdf, sized to exact A4 (595.28 x 841.89 pt)
function canvasToPDFBlob(canvas, quality) {
  const dataURL = canvas.toDataURL('image/jpeg', quality || 0.92);
  const jpegBytes = dataURLToBytes(dataURL);
  const pdfBytes = buildPDFBytes(jpegBytes, canvas.width, canvas.height, 595.28, 841.89);
  return new Blob([pdfBytes], { type: 'application/pdf' });
}

if (typeof module !== 'undefined') {
  module.exports = { buildPDFBytes, dataURLToBytes, canvasToPDFBlob };
}

// ---- Detection & validation (shared logic, framework-free) ----

function detectAccountType(raw) {
  const cleaned = raw.replace(/\s+/g, '');
  if (cleaned.length === 0) return 'empty';
  return /^[A-Za-z]/.test(cleaned) ? 'iban' : 'mobile';
}

function validateIBAN(raw) {
  const clean = raw.replace(/\s+/g, '').toUpperCase();
  if (clean.length === 0) return { valid: false, message: 'Enter an IBAN' };
  if (!clean.startsWith('BH')) return { valid: false, message: 'Must start with "BH"' };
  if (!/^[A-Z0-9]+$/.test(clean)) return { valid: false, message: 'Only letters and numbers allowed' };
  if (clean.length < 22) return { valid: false, message: `${22 - clean.length} more character(s) needed (22 total)` };
  if (clean.length > 22) return { valid: false, message: `${clean.length - 22} character(s) too many (22 total)` };
  return { valid: true, message: 'Valid IBAN ✓', clean };
}

function validateMobile(raw) {
  const digits = raw.replace(/\D/g, '');
  let main = digits;
  if (digits.startsWith('973')) main = digits.substring(3);
  if (main.length === 0) return { valid: false, message: 'Enter a mobile number' };
  if (!/^[136]/.test(main)) return { valid: false, message: 'Must start with 1, 3, or 6' };
  if (main.length < 8) return { valid: false, message: `${8 - main.length} more digit(s) needed (8 total)` };
  if (main.length > 8) return { valid: false, message: `${main.length - 8} digit(s) too many (8 total)` };
  return { valid: true, message: 'Valid mobile number ✓', clean: main };
}

function validateAccountInput(raw) {
  const type = detectAccountType(raw);
  if (type === 'empty') return { type, valid: false, message: 'Enter an IBAN or mobile number' };
  const result = type === 'iban' ? validateIBAN(raw) : validateMobile(raw);
  return Object.assign({ type }, result);
}

function formatIBANDisplay(clean) {
  const parts = [];
  for (let i = 0; i < clean.length; i += 4) parts.push(clean.substring(i, i + 4));
  return parts.join(' ');
}

function formatMobileDisplay(mainDigits) {
  // mainDigits is the 8-digit local number, e.g. '39123456' -> '3912 3456' (no country code shown)
  return mainDigits.substring(0, 4) + ' ' + mainDigits.substring(4, 8);
}

function buildPayload(config) {
  const v = validateAccountInput(config.accountInput || '');
  if (!v.valid) return { ok: false, message: v.message, type: v.type };

  // Per spec: the QR JSON payload always uses the "iban" key, even when the
  // input is a mobile number, and always includes an "amount" key (empty if unset).
  const payloadObj = { iban: v.clean, amount: '' };

  const display = v.type === 'iban' ? formatIBANDisplay(v.clean) : formatMobileDisplay(v.clean);
  return { ok: true, text: JSON.stringify(payloadObj), display, type: v.type };
}

if (typeof module !== 'undefined') {
  module.exports = { detectAccountType, validateIBAN, validateMobile, validateAccountInput, formatIBANDisplay, formatMobileDisplay, buildPayload };
}

// ---- App state & constants ----
const COLORS = [
  { id: 'red', name: 'Red' },
  { id: 'gray', name: 'Gray' }
];

const LAYOUTS = [
  { id: '1x', label: '1× Poster', rows: 1, cols: 1 },
  { id: '2x', label: '2× Desk', rows: 2, cols: 1 },
  { id: '4x', label: '4× Mini', rows: 2, cols: 2 },
  { id: '6x', label: '6× Grid', rows: 3, cols: 2 }
];

const PAGE_W = 1240, PAGE_H = 1754; // A4 portrait @ ~150dpi
const PAGE_MARGIN = 46, CELL_GAP = 24;

const DEFAULTS = {
  accountName: '',
  accountInput: '',
  color: COLORS[0].id,
  layout: '1x',
  showCuttingGuide: true
};

const SPLASH_MESSAGES = [
  'Generate your BenefitPay QR code the easiest way',
  'One QR. Instant payments. Zero hassle.',
  'Print it, stick it, get paid.',
  'Your business, one scan away.',
  'Turn any counter into a payment counter.',
  'No login required',
  'At Your Service - ✦ Arif'
];
let splashIndex = 0;
let splashAnimRunning = false;
let splashStartTime = 0;
let splashMsgStartTime = 0;
const SPLASH_DISPLAY_MS = 2800;
const SPLASH_FADE_MS = 450;

function getSplashFrame() {
  const now = performance.now();
  const elapsed = now - splashMsgStartTime;
  const cycle = SPLASH_DISPLAY_MS + SPLASH_FADE_MS;
  if (elapsed > cycle) {
    splashIndex = (splashIndex + 1) % SPLASH_MESSAGES.length;
    splashMsgStartTime = now;
  }
  const t = now - splashMsgStartTime;
  let opacity = 1;
  if (t < SPLASH_FADE_MS) opacity = t / SPLASH_FADE_MS;
  else if (t > SPLASH_DISPLAY_MS) opacity = 1 - (t - SPLASH_DISPLAY_MS) / SPLASH_FADE_MS;
  return {
    message: SPLASH_MESSAGES[splashIndex],
    opacity: Math.max(0, Math.min(1, opacity)),
    waveTime: (now - splashStartTime) / 1000
  };
}

function splashAnimLoop() {
  if (!splashAnimRunning) return;
  renderSheet();
  requestAnimationFrame(splashAnimLoop);
}

function startSplashCycle() {
  if (splashAnimRunning) return;
  splashAnimRunning = true;
  splashStartTime = performance.now();
  splashMsgStartTime = performance.now();
  requestAnimationFrame(splashAnimLoop);
}
function stopSplashCycle() {
  splashAnimRunning = false;
}

let state = Object.assign({}, DEFAULTS);

const canvas = document.getElementById('sheetCanvas');
canvas.width = PAGE_W;
canvas.height = PAGE_H;
const ctx = canvas.getContext('2d');

// ---- Build color + layout selector buttons ----
const colorGrid = document.getElementById('colorGrid');
COLORS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'color-swatch' + (c.id === state.color ? ' active' : '');
  const theme = COLOR_THEMES[c.id];
  btn.style.background = `linear-gradient(135deg, ${theme.grad1}, ${theme.grad2})`;
  btn.textContent = c.name;
  btn.addEventListener('click', () => {
    state.color = c.id;
    document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    renderSheet();
  });
  colorGrid.appendChild(btn);
});

const layoutGrid = document.getElementById('layoutGrid');
LAYOUTS.forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'layout-btn' + (l.id === state.layout ? ' active' : '');
  btn.textContent = l.label;
  btn.addEventListener('click', () => {
    state.layout = l.id;
    document.querySelectorAll('.layout-btn').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    renderSheet();
  });
  layoutGrid.appendChild(btn);
});

// ---- Field wiring ----
function wireField(id, stateKey, after) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    state[stateKey] = el.value;
    if (after) after();
    renderSheet();
  });
}

wireField('accountName', 'accountName');
wireField('accountInput', 'accountInput', updateAccountHint);

function updateAccountHint() {
  const hintEl = document.getElementById('accountHint');
  const raw = state.accountInput;
  if (!raw || raw.trim() === '') {
    hintEl.textContent = '';
    hintEl.className = 'field-hint';
    return;
  }
  const v = validateAccountInput(raw);
  hintEl.textContent = v.message;
  hintEl.className = 'field-hint ' + (v.valid ? 'hint-ok' : 'hint-error');
}

document.getElementById('cuttingGuideToggle').addEventListener('change', (e) => {
  state.showCuttingGuide = e.target.checked;
  renderSheet();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state = Object.assign({}, DEFAULTS);
  document.getElementById('accountName').value = state.accountName;
  document.getElementById('accountInput').value = state.accountInput;
  document.getElementById('cuttingGuideToggle').checked = state.showCuttingGuide;
  document.querySelectorAll('.color-swatch').forEach((el, i) => el.classList.toggle('active', COLORS[i].id === state.color));
  document.querySelectorAll('.layout-btn').forEach((el, i) => el.classList.toggle('active', LAYOUTS[i].id === state.layout));
  updateAccountHint();
  renderSheet();
});

// ---- Render (watermark always shown - in preview AND downloads) ----
function getGrid() {
  return LAYOUTS.find(l => l.id === state.layout) || LAYOUTS[0];
}

function renderSheet() {
  ctx.clearRect(0, 0, PAGE_W, PAGE_H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, PAGE_W, PAGE_H);

  const grid = getGrid();
  const cellH = (PAGE_H - PAGE_MARGIN * 2 - CELL_GAP * (grid.rows - 1)) / grid.rows;

  // Cards are sized to a sensible portrait aspect ratio first, then the whole
  // row of cards is centered on the page with a fixed, consistent gap between
  // them. This avoids the old approach of stretching cells to fill the page
  // width and then shrinking cards inside oversized cells, which made the
  // gap between cards inconsistent across layouts (e.g. 2x/6x vs 1x/4x).
  const idealCardW = cellH * 0.70;
  const availW = PAGE_W - PAGE_MARGIN * 2;
  const totalGridW = grid.cols * idealCardW + (grid.cols - 1) * CELL_GAP;
  let cardW, gridStartX;
  if (totalGridW <= availW) {
    cardW = idealCardW;
    gridStartX = PAGE_MARGIN + (availW - totalGridW) / 2;
  } else {
    cardW = (availW - (grid.cols - 1) * CELL_GAP) / grid.cols;
    gridStartX = PAGE_MARGIN;
  }

  const payload = buildPayload(state);
  let qr = null;
  if (payload.ok) {
    qr = qrcode(0, 'H');
    qr.addData(payload.text);
    qr.make();
  }

  if (payload.type === 'empty') startSplashCycle();
  else stopSplashCycle();

  const splashFrame = payload.type === 'empty' ? getSplashFrame() : null;

  for (let r = 0; r < grid.rows; r++) {
    for (let c = 0; c < grid.cols; c++) {
      const cx = gridStartX + c * (cardW + CELL_GAP);
      const cy = PAGE_MARGIN + r * (cellH + CELL_GAP);
      if (payload.ok) {
        drawCard(ctx, cx, cy, cardW, cellH, state.color, {
          accountName: state.accountName || 'Your Business Name',
          accountDisplay: payload.display
        }, qr);
      } else if (payload.type === 'empty') {
        drawSplashCard(ctx, cx, cy, cardW, cellH, splashFrame.message, splashFrame.opacity, splashFrame.waveTime, state.color);
      } else {
        drawPlaceholderCard(ctx, cx, cy, cardW, cellH, payload.message);
      }
    }
  }

  if (state.showCuttingGuide) {
    drawCuttingGuide(grid, cardW, cellH, gridStartX);
  }

  return payload.ok;
}

const GUIDE_DIST = CELL_GAP / 2;

function drawCuttingGuide(grid, cardW, cellH, gridStartX) {
  ctx.save();
  ctx.strokeStyle = '#b6bac2';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 8]);

  // Single straight lines spanning the full page, each positioned exactly
  // GUIDE_DIST from the nearest card edge on every side - identical distance
  // everywhere since cards now sit in a uniformly-gapped, centered grid.
  for (let r = 0; r <= grid.rows; r++) {
    let yy;
    if (r === 0) yy = PAGE_MARGIN - GUIDE_DIST;
    else if (r === grid.rows) yy = PAGE_MARGIN + grid.rows * cellH + (grid.rows - 1) * CELL_GAP + GUIDE_DIST;
    else yy = PAGE_MARGIN + r * cellH + (r - 0.5) * CELL_GAP;
    ctx.beginPath();
    ctx.moveTo(0, yy);
    ctx.lineTo(PAGE_W, yy);
    ctx.stroke();
  }

  for (let c = 0; c <= grid.cols; c++) {
    let xx;
    if (c === 0) xx = gridStartX - GUIDE_DIST;
    else if (c === grid.cols) xx = gridStartX + grid.cols * cardW + (grid.cols - 1) * CELL_GAP + GUIDE_DIST;
    else xx = gridStartX + c * cardW + (c - 0.5) * CELL_GAP;
    ctx.beginPath();
    ctx.moveTo(xx, 0);
    ctx.lineTo(xx, PAGE_H);
    ctx.stroke();
  }
  ctx.restore();
}

// ---- Downloads ----
function sanitizeFilename(str) {
  return (str || 'Your Business Name').trim().replace(/[\\/:*?"<>|]+/g, '').replace(/\s+/g, ' ');
}

function triggerDownload(href, filename) {
  const a = document.createElement('a');
  a.href = href;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

document.getElementById('downloadJpgBtn').addEventListener('click', () => {
  if (!renderSheet()) {
    document.getElementById('accountInput').focus();
    return;
  }
  const dataURL = canvas.toDataURL('image/jpeg', 0.92);
  triggerDownload(dataURL, `✦ Arif-${sanitizeFilename(state.accountName)}.jpg`);
  saveHistoryEntry({ businessName: state.accountName, accountInput: state.accountInput, color: state.color, layout: state.layout });
});

document.getElementById('downloadPdfBtn').addEventListener('click', () => {
  if (!renderSheet()) {
    document.getElementById('accountInput').focus();
    return;
  }
  const blob = canvasToPDFBlob(canvas, 0.92);
  const url = URL.createObjectURL(blob);
  triggerDownload(url, `✦ Arif-${sanitizeFilename(state.accountName)}.pdf`);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  saveHistoryEntry({ businessName: state.accountName, accountInput: state.accountInput, color: state.color, layout: state.layout });
});

// ---- Initial paint ----
updateAccountHint();
renderSheet();

let fbDb = null;
let firebaseReady = false;
try {
  if (typeof firebase !== 'undefined' && !firebaseConfig.databaseURL.includes('TODO')) {
    firebase.initializeApp(firebaseConfig);
    fbDb = firebase.database();
    firebaseReady = true;
  }
} catch (e) {
  console.warn('Firebase not available:', e);
}

function saveHistoryEntry(entry) {
  const statusEl = document.getElementById('saveStatus');
  if (!firebaseReady || !fbDb) {
    if (statusEl) {
      statusEl.textContent = 'History not connected (Firebase not configured/reachable)';
      statusEl.className = 'save-status save-status-error';
    }
    return;
  }
  if (statusEl) {
    statusEl.textContent = 'Saving to history...';
    statusEl.className = 'save-status';
  }
  fbDb.ref('qrHistory').push({
    businessName: entry.businessName,
    accountInput: entry.accountInput,
    color: entry.color,
    layout: entry.layout,
    timestamp: Date.now()
  }).then(() => {
    if (statusEl) {
      statusEl.textContent = 'Saved to history ✓';
      statusEl.className = 'save-status save-status-ok';
    }
  }).catch(e => {
    console.warn('Failed to save history:', e);
    if (statusEl) {
      statusEl.textContent = 'Save failed: ' + (e && e.message ? e.message : e);
      statusEl.className = 'save-status save-status-error';
    }
  });
}

function loadHistory(callback) {
  if (!firebaseReady || !fbDb) { callback(null); return; }
  fbDb.ref('qrHistory').once('value')
    .then(snapshot => {
      const items = [];
      snapshot.forEach(child => items.push(Object.assign({ id: child.key }, child.val())));
      items.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      callback(items.slice(0, 30));
    })
    .catch(e => { console.warn('Failed to load history:', e); callback([]); });
}

const HISTORY_DELETE_PIN = '1010';

function deleteHistoryEntry(id) {
  const pin = prompt('Enter PIN to delete this entry:');
  if (pin === null) return;
  if (pin !== HISTORY_DELETE_PIN) {
    alert('Incorrect PIN. Entry not deleted.');
    return;
  }
  if (!firebaseReady || !fbDb) return;
  fbDb.ref('qrHistory/' + id).remove()
    .then(() => loadHistory(renderHistoryList))
    .catch(e => alert('Delete failed: ' + (e && e.message ? e.message : e)));
}

function renderHistoryList(items) {
  const listEl = document.getElementById('historyList');
  listEl.innerHTML = '';
  if (items === null) {
    listEl.innerHTML = '<div class="history-empty">History isn\'t set up yet (needs a free Firebase project - see code comments).</div>';
    return;
  }
  if (items.length === 0) {
    listEl.innerHTML = '<div class="history-empty">No saved entries yet. Download a QR to save one.</div>';
    return;
  }
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'history-item';

    const btn = document.createElement('button');
    btn.className = 'history-item-main';
    const when = new Date(item.timestamp || Date.now()).toLocaleString();
    btn.innerHTML = `<span class="h-name"></span><span class="h-account"></span><span class="h-meta"></span>`;
    btn.querySelector('.h-name').textContent = item.businessName || 'Untitled';
    btn.querySelector('.h-account').textContent = item.accountInput || '';
    btn.querySelector('.h-meta').textContent = when;
    btn.addEventListener('click', () => {
      state.accountName = item.businessName || state.accountName;
      state.accountInput = item.accountInput || state.accountInput;
      state.color = item.color || state.color;
      state.layout = item.layout || state.layout;
      document.getElementById('accountName').value = state.accountName;
      document.getElementById('accountInput').value = state.accountInput;
      document.querySelectorAll('.color-swatch').forEach((el, i) => el.classList.toggle('active', COLORS[i].id === state.color));
      document.querySelectorAll('.layout-btn').forEach((el, i) => el.classList.toggle('active', LAYOUTS[i].id === state.layout));
      updateAccountHint();
      renderSheet();
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'history-delete-btn';
    delBtn.title = 'Delete entry';
    delBtn.textContent = '🗑';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteHistoryEntry(item.id);
    });

    row.appendChild(btn);
    row.appendChild(delBtn);
    listEl.appendChild(row);
  });
}

document.getElementById('loadHistoryBtn').addEventListener('click', () => {
  document.getElementById('historyList').innerHTML = '<div class="history-empty">Loading...</div>';
  loadHistory(renderHistoryList);
});
